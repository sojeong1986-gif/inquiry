<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --error: #dc2626;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .card {
      background: var(--card);
      width: 100%;
      max-width: 560px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 36px 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p.sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 14px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    label .req { color: var(--error); }
    input, select, textarea {
      width: 100%;
      padding: 11px 12px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    textarea { resize: vertical; min-height: 120px; }
    button {
      width: 100%;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--primary-dark); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.show { display: block; }
    .status.success { background: #dcfce7; color: var(--success); }
    .status.error { background: #fee2e2; color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <h1>제휴 문의</h1>
    <p class="sub">제휴 관련 문의를 남겨주시면 담당자가 확인 후 연락드리겠습니다.</p>

    <form id="inquiryForm" action="https://formspree.io/f/xaqgjlne" method="POST">
      <div class="field">
        <label for="company">회사명 <span class="req">*</span></label>
        <input type="text" id="company" name="회사명" required />
      </div>

      <div class="field">
        <label for="manager">담당자 <span class="req">*</span></label>
        <input type="text" id="manager" name="담당자" required />
      </div>

      <div class="field">
        <label for="email">이메일 <span class="req">*</span></label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="field">
        <label for="phone">연락처 <span class="req">*</span></label>
        <input type="tel" id="phone" name="연락처" required />
      </div>

      <div class="field">
        <label for="type">제휴유형 <span class="req">*</span></label>
        <select id="type" name="제휴유형" required>
          <option value="" disabled selected>선택해주세요</option>
          <option value="기술제휴">기술 제휴</option>
          <option value="마케팅제휴">마케팅 제휴</option>
          <option value="유통/판매제휴">유통/판매 제휴</option>
          <option value="콘텐츠제휴">콘텐츠 제휴</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="field">
        <label for="message">문의내용 <span class="req">*</span></label>
        <textarea id="message" name="문의내용" required placeholder="제휴 제안 내용을 자유롭게 작성해주세요."></textarea>
      </div>

      <button type="submit" id="submitBtn">문의 보내기</button>

      <div class="status" id="status"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("inquiryForm");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function showStatus(type, msg) {
      status.className = "status show " + type;
      status.textContent = msg;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";
      status.className = "status";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { Accept: "application/json" },
        });

        if (response.ok) {
          showStatus("success", "문의가 정상적으로 접수되었습니다. 감사합니다!");
          form.reset();
        } else {
          const data = await response.json().catch(() => ({}));
          const msg =
            data && data.errors && data.errors.length
              ? data.errors.map((err) => err.message).join(", ")
              : "전송에 실패했습니다. 잠시 후 다시 시도해주세요.";
          showStatus("error", msg);
        }
      } catch (err) {
        showStatus("error", "네트워크 오류로 전송하지 못했습니다. 연결을 확인 후 다시 시도해주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "문의 보내기";
      }
    });
  </script>
</body>
</html>
